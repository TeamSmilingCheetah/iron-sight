name: Build Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-2022

    strategy:
      matrix:
        configuration: [ Debug, Release ]
        platform: [ x64 ]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install gdown
        run: pip install gdown==5.2.0

      - name: Download External Libraries
        run: ./download_library.ps1
        shell: pwsh

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Solution
        run: msbuild IronSight.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /p:PlatformToolset=v143 /p:CharacterSet=Unicode /p:PreferredToolArchitecture=x64 /p:UseUnicodeResponseFiles=true /verbosity:minimal

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            OutputFile/Bin/
            !OutputFile/Bin/Intermediate/
            !OutputFile/Bin/Log/
          retention-days: 1

      - name: Upload Build Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.configuration }}-${{ matrix.platform }}
          path: OutputFile/Bin/Intermediate/*.log
          retention-days: 7
